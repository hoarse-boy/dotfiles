# в–Ҳв–‘в–ҲвҖғв–Ҳв–Ҳв–„вҖғв–‘в–Ҳв–‘вҖғв–Ҳв–„в–ҲвҖғв–ҲвҖғв–Ҳв–‘в–Җв–ҲвҖғв–Ҳв–„в–ҖвҖғв–ҲвҖғв–Ҳв–‘в–Җв–ҲвҖғв–Ҳв–„в–ҲвҖғв–„в–Ҳ

# ==================== KEYBINDING CONVENTIONS ====================
# SUPER -  main window management and workspace navigation. if any of any binding + SUPER, means it is OS level shortcut.
# ALT - window / app navigation, or + SUPER for alternate OS level shortcut.
# CTRL - reserved for in-app shortcuts if used alone. otherwise, can be used with other modifiers. ex. SUPER + CTRL + K.
# SHIFT - modifier for alternate actions.

# ==================== TIPS TO ADD NEW KEYBINDING ====================
# search the existing keybdingins
# or type it directly to test if it exists
# create new binding at below VARIABLES section
# create new binding and use this to test first:
# bindd = $mainMod, X, Test binding, exec, notify-send "Test" "this is just a test to show the keybinding is working" -t 2000

# this the fastest way to restore tabs from history without spawning chrased pwa
# exec-once = notify-send "Chromium" "Ctrl-shift-t to restore tabs from history if chromium crashed" -t 2000 

# ==================== APPLICATIONS ====================
bindd = $mainMod, T, Launch terminal, exec, $term
bindd = $mainMod, B, Launch browser, exec, $browser
bind = $mainMod, F, exec, $fileManager
bindd = ALT, Space, Application launcher, exec, pkill rofi || rofi -show drun -replace -i
bindd = ALT, F, Toggle Floating, togglefloating

# ==================== WORKSPACES ====================
# workspace switching
bindd = $mainMod, 1, Workspace 1, exec, $hyprScript/toggle-workspace.sh 1
bindd = $mainMod, 2, Workspace 2, exec, $hyprScript/toggle-workspace.sh 2
bindd = $mainMod, 3, Workspace 3, exec, $hyprScript/toggle-workspace.sh 3
bindd = $mainMod, 4, Workspace 4, exec, $hyprScript/toggle-workspace.sh 4
bindd = $mainMod, 5, Workspace 5, exec, $hyprScript/toggle-workspace.sh 5
bindd = $mainMod, 6, Workspace 6, exec, $hyprScript/toggle-workspace.sh 6
bindd = $mainMod, 7, Workspace 7, exec, $hyprScript/toggle-workspace.sh 7
bindd = $mainMod, 8, Workspace 8, exec, $hyprScript/toggle-workspace.sh 8
bindd = $mainMod, 9, Workspace 9, exec, $hyprScript/toggle-workspace.sh 9
bindd = $mainMod, 0, Workspace 10, exec, $hyprScript/toggle-workspace.sh 10

# workspace navigation
bindd = $mainMod, mouse_down, Next workspace, workspace, e+1
bindd = $mainMod, $vimRight, Next workspace, exec, $hyprScript/smart-ws-nav.sh right
bindd = $mainMod, $vimLeft, Previous workspace, exec, $hyprScript/smart-ws-nav.sh left
bindd = $mainMod, $vimDown, Open Empty Workspace, exec, $hyprScript/smart-ws-nav.sh down

# ==================== WINDOW MANAGEMENT ====================
bindd = $mainMod, Q, Close window, killactive
bindd = $mainMod SHIFT, Q, Quit application, exec, hyprctl activewindow | grep pid | tr -d 'pid:' | xargs kill
bindd = $mainMod SHIFT, M, Toggle fullscreen, fullscreen, 0
bindd = $mainMod, M, Maximize window, fullscreen, 1
bindd = $mainMod SHIFT ALT, T, Float all windows, workspaceopt, allfloat
bindd = ALT, S, Toggle split, togglesplit # changing the window orientation of vertical or horizontal

# only for flaoting windows
# for all windows, use cyclenext without params
bindd = ALT, Tab, Cycle Next Window, cyclenext, floating 
bindd = ALT+SHIFT, Tab, Cycle Next Window, cyclenext, prev floating
bindd = $mainMod+ALT, Tab, Cycle Next Window, cyclenext, tiled 

# window movement with mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# move window to N workspace are moved to layout-*.conf file

# ==================== NOTIFICATION ====================
bindd = $mainMod ALT CTRL, R, Hide latest notification, exec, swaync-client --hide-latest
bindd = $mainMod ALT CTRL, N, Hide latest notification, exec, swaync-client -t

# ==================== SCREENSHOTS ====================
bind = , Print, exec, ~/.local/bin/screenshot-avif fullscreen
bind = $mainMod, Print, exec, ~/.local/bin/screenshot-avif window
bind = $mainMod, P, exec, ~/.local/bin/screenshot-avif region

# ==================== SYSTEM ====================
bindd = $mainMod CTRL, R, Reload Hyprland, exec, hyprctl reload
bind = $mainMod , V, exec, $hyprScript/clip.sh

# ==================== THEME PICKERS ====================
bind = $mainMod Alt, W, exec, $hyprScript/wppicker.sh # wallpaper picker
bind = $mainMod Alt SHIFT, W, exec, $hyprScript/toggle-rand-wall.sh
bind = $mainMod Alt, T, exec, $hyprScript/themepicker.sh
bind = $mainMod Alt, S, exec, $hyprScript/syslauncher.sh
bind = $mainMod Alt, B, exec, ~/.config/waybar/scripts/launch.sh
bind = $mainMod Alt, H, exec, ~/.config/waybar/scripts/hide.sh

# ==================== FUNCTION KEYS ====================
bindd = , XF86MonBrightnessUp, Increase brightness, exec, brightnessctl -q s +10%
bindd = , XF86MonBrightnessDown, Decrease brightness, exec, brightnessctl -q s 10%-

bindd = , XF86AudioRaiseVolume, Increase volume, exec, swayosd-client --output-volume raise
bindd = , XF86AudioLowerVolume, Decrease volume, exec, swayosd-client --output-volume lower

# toggle mute output sound
bindd = , XF86AudioMute, Toggle mute, exec, swayosd-client --output-volume mute-toggle
# bindd = , XF86AudioMute, Toggle mute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# toggle mute input / mic  sound
# mic mute toggle with osd. with keyboard that does not have mic mute
# bind = $mainMod ALT SHIFT, M, exec, swayosd-client --input-volume mute-toggle # NOTE: swayosd has bug with mic mute
bind = $mainMod ALT SHIFT, M, exec, ~/.config/hypr/scripts/toggle-mic.sh

bindd = , XF86AudioPlay, Play/pause, exec, playerctl play-pause
bindd = , XF86AudioNext, Next track, exec, playerctl next
bindd = , XF86AudioPrev, Previous track, exec, playerctl previous

# mic mute toggle with osd
# bindel = ,XF86AudioMicMute, exec, swayosd-client --input-volume mute-toggle

bindd = , XF86Lock, Lock screen, exec, hyprlock

# ==================== OTHER ====================
# See https://wiki.hypr.land/Configuring/Keywords/
bind = $mainMod, A, exec, swaync-client -t -sw
# Example binds, see https://wiki.hypr.land/Configuring/Binds/ for more
bind = $mainMod, grave, exec, ~/.config/rofi/scripts/key.sh

bind = $mainMod, Backspace, exec, ~/.config/wlogout/launch-wlogout.sh

# Toggle overview (Mission Control style)

bind = $mainMod, Tab, global, quickshell:overviewToggle
bind = $mainMod Shift, B, exec, ~/.config/waybar/scripts/waybar-theme-rofi.sh

# Stash operations
bind = $mainMod Shift, V, global, quickshell:stashWorkspace 
bind = $mainMod Shift, U, global, quickshell:unstashQuick

# Image search (Google Lens)
bind = Super+Shift, A, global, quickshell:regionSearch

bind = Super Alt, R, exec, ~/.config/rofi/scripts/rofi-theme-switcher.sh

# OCR text extraction
bind = Super+Shift, X, global, quickshell:regionOcr

# screen recroder
bind = SUPER + SHIFT, R, exec, $hyprScript/record-screen.sh
# record with mic
bind = $mainMod + SHIFT + ALT, R, exec, $hyprScript/record-screen.sh --mic

# Color picker (requires hyprpicker)
bind = Super+Shift, C, exec, hyprpicker -a

# Scroll through existing workspaces with mainMod + scroll
bindd = $mainMod, mouse_down, next workspace, workspace, e+1
bindd = $mainMod, mouse_up, previous workspace, workspace, e-1

# wl-kbptr / mouseless
# bindr = ALT, ALT_L, exec, $hyprScript/wl-kbptr.sh # use kanata binding instead
