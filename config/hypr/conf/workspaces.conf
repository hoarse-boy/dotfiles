# these variables are injected from dynamic-var.conf
# it will be updated per theme opaciaty.conf
# $blackThemedOpacity = 0.9
# $opacityValue = 0.95
# $opacityDarker = 0.97

# named normal workspaces

# atch command to remove stale sessions
$atchRm = atch rm -a &&

# note workspace and window
$note_cw = nt
$quicknote = $atchRm kitty --class $note_cw $hyprScript/open-quick-note.sh
bind = $mainMod, N, exec, $hyprScript/smart-ws-nav.sh toggle $note_cw
workspace = name:$note_cw, on-created-empty:$quicknote

windowrule {
  name = kitty quicknote window
  match:class = $note_cw
  workspace = name:$note_cw
  opacity = $blackThemedOpacity
  no_screen_share = on
}
exec-once = $quicknote

$term_cw = tm
$spc_term = $atchRm $hyprScript/open-kitty-session.sh $term_cw tm.session
workspace = name:$term_cw, on-created-empty:$spc_term
bind = $mainMod, I, exec, $hyprScript/smart-ws-nav.sh toggle $term_cw
windowrule {
  name = kitty general terminal window
  match:class = $term_cw
  workspace = name:$term_cw
  # render_unfocused = true
  opacity = $blackThemedOpacity
}
exec-once = $spc_term

# terminal for config and dotfiles
$config_cw = cf
$term_config = $atchRm $hyprScript/open-kitty-session.sh $config_cw cf.session
workspace = name:$config_cw, on-created-empty:$term_config
bind = $mainMod, O, exec, $hyprScript/smart-ws-nav.sh toggle $config_cw
windowrule {
  name = kitty config window
  match:class = $config_cw
  workspace = name:$config_cw
  opacity = $blackThemedOpacity
}
exec-once = $term_config

$ws_ai = ai
$vivaldi_chatgpt = vivaldi --enable-features=UseOzonePlatform --ozone-platform=wayland --app=https://chatgpt.com
$cl_gpt = vivaldi-chatgpt.com__-Default
workspace = name:$ws_ai, on-created-empty:$vivaldi_chatgpt
bind = $mainMod, Return, exec, $hyprScript/smart-ws-nav.sh toggle $ws_ai
windowrule {
  name = vivaldi chatgpt window
  match:class = $cl_gpt
  workspace = name:$ws_ai
  opacity = $opacityValue
  fullscreen_state = 1 1
}
exec-once = $vivaldi_chatgpt

# deepseek
$vivaldi_deepseek = vivaldi --enable-features=UseOzonePlatform --ozone-platform=wayland --app=https://chat.deepseek.com
$cl_ds = vivaldi-chat.deepseek.com__-Default
windowrule {
  name = vivaldi deepseek window
  match:class = $cl_ds
  workspace = name:$ws_ai
  opacity = $opacityValue
}
exec-once = $vivaldi_deepseek 

# kimi
$vivaldi_kimi = vivaldi --enable-features=UseOzonePlatform --ozone-platform=wayland --app=https://www.kimi.com
$cl_kimi = vivaldi-www.kimi.com__-Default
windowrule {
  name = vivaldi kimi window
  match:class = $cl_kimi
  workspace = name:$ws_ai
  opacity = $opacityValue
}
# exec-once = $vivaldi_kimi # makes vivaldi crashed

# gemini
$vivaldi_gem = vivaldi --enable-features=UseOzonePlatform --ozone-platform=wayland --app=https://gemini.google.com/app
$cl_gem = vivaldi-gemini.google.com__app-Default
windowrule {
  name = vivaldi gemini window
  match:class = $cl_gem
  workspace = name:$ws_ai
  opacity = $opacityValue
}
exec-once = $vivaldi_gem

# special workspaces

$rmpc_cw = fmpd
$rmpc_term = kitty --class $rmpc_cw rmpc
bind = $mainMod, R, exec, $hyprScript/toggle-special-workspace.sh "$rmpc_term" "$rmpc_cw" "$rmpc_cw"
windowrule {
    name = rmpc window
    match:class = $rmpc_cw
    workspace = special:$rmpc_cw
    opaque = true
    size = (monitor_w*0.8) (monitor_h*0.6)
    float = on
    center = on
}
exec-once = $rmpc_term

$btop_term = kitty --class $fTerm btop
bind = $mainMod, Z, exec, $hyprScript/toggle-special-workspace.sh "$btop_term" "$fTerm" "$fTerm"
windowrule {
    name = btop window
    match:class = $fTerm
    workspace = special:$fTerm
    opaque = true
}
exec-once = $btop_term

$yazi_cw = yazi
$yazi_term = kitty --class $yazi_cw yazi
bind = $mainMod, Y, exec, $hyprScript/toggle-special-workspace.sh "$yazi_term" "$yazi_cw" "$yazi_cw"
windowrule {
    name = yazi window
    match:class = $yazi_cw
    workspace = special:$yazi_cw
    opaque = true
    size = (monitor_w*0.9) (monitor_h*0.8)
    float = on
    center = on
}
# exec-once = $yazi_term

# windowrule for common workspace

# TODO: create new bind for 'u' 'o' and 'y'

# NOTE: exec examples
# bindd = $mainMod, Z, ChatGpt, exec, [workspace 2 silent; tile] google-chrome-stable --app=https://www.chatgpt.com # example of using exec rules
# hyprctl dispatch workspace 2 && hyprctl dispatch layoutmsg tiling && google-chrome-stable --app=https://www.chatgpt.com & # command line equivalent

# ws 1. browser
windowrule {
  name = firefox window
  match:class = firefox
  workspace = 1
}

windowrule {
  name = chromium window
  match:class = chromium
  workspace = 1
}

windowrule {
  name = vivaldi window
  match:class = vivaldi-stable
  workspace = 1
}
exec-once = $browser

# ws 2. terminal emulator
windowrule {
  name = kitty window
  match:class = kitty
  workspace = 2
    no_blur = on
  opacity = $blackThemedOpacity
}
$work_session = $atchRm $hyprScript/open-kitty-session.sh
# launch kitty with work session
exec-once = $work_session
bind = $mainMod+SHIFT, T, exec, $work_session

windowrule {
  name = ghostty window
  match:class = com.mitchellh.ghostty
  workspace = 2
  opacity = $blackThemedOpacity
}

windowrule {
  name = wezterm window
  match:class = wezterm
  workspace = 2
  opacity = $opacityDarker
}

# ws 3. http client app, sql db app, and other related coding apps
windowrule {
  name = postman window
  match:class = Postman
  workspace = 3
  opacity = $opacityValue
}
# exec-once = postman

windowrule {
  name = redis window
  match:class = RedisInsight
  workspace = 3
  opacity = $opacityValue
}

windowrule {
  name = dbeaver window
  match:class = DBeaver
  workspace = 3
  opacity = $opacityValue
}

# ws 4. messanger, etc
windowrule {
  name = slack window
  match:class = Slack
  workspace = 4
  opacity = $opacityValue
}
# exec-once = slack

windowrule {
  name = teams window
  match:class = vivaldi-teams.live.com__-Default
  workspace = 4
  opacity = $opacityValue
}

windowrule {
  name = telegram window
  match:class = org.telegram.desktop
  workspace = 4
  opacity = $opacityValue
}

windowrule {
  name = obsidian window
  match:class = obsidian
  workspace = 4
  opacity = $opacityValue
}

# NOTE: dont enable this for any explorer gui as it is needed when drop and drag with other gui or any other use case.
# windowrulev2 = workspace 4, class:^(org.gnome.Nautilus)$
# windowrulev2 = workspace 4, class:^(org.kde.dolphin)$

# ws 5. other less important apps
windowrule {
  name = lollypop window
  match:class = org.gnome.Lollypop
  workspace = 5
  opacity = $opacityValue
}

