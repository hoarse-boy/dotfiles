# # URL underline color - Vivid blue
url_color               #2A8AFF

# # Window border - Intense periwinkle
active_border_color     #8AA1FF
inactive_border_color   #636A9C
bell_border_color       #FFCD4D

################################################################################
## OTHER
################################################################################

shell fish

# Background transparency (0.0 is fully transparent, 1.0 is fully opaque)
# let window manager handle this dynamically
background_opacity 1.0
# background_opacity 0.9
# adjust_window_size_for_font_scale yes

confirm_os_window_close 0

window_padding_width 0 0 2 2

# cursor and selection colors
cursor #81a1c1
selection_foreground #2e3440
selection_background #88c0d0

hide_window_decorations yes

paste_actions filter

# include macos.conf
include arch.conf

cursor_trail 3
cursor_trail_decay 0.1 0.4
cursor_blink_interval 0.5 ease-in-out

mouse_hide_wait -1

################################################################################
## KITTY_SCROLLBACK_NVIM
################################################################################

# this is nvim scrollback plugin to make nvim as pager and removing osc 133 escape code etc to make it clean and readble.
# this can run commands too
listen_on unix:/tmp/kitty
allow_remote_control yes
shell_integration enabled

# kitty-scrollback.nvim Kitten alias
action_alias kitty_scrollback_nvim kitten '/home/jho/.local/share/nvim/lazy/kitty-scrollback.nvim/python/kitty_scrollback_nvim.py'
# Browse scrollback buffer in nvim
map kitty_mod+p kitty_scrollback_nvim
# Browse output of the last shell command in nvim
map kitty_mod+g kitty_scrollback_nvim --config ksb_builtin_last_cmd_output
# Show clicked command output in nvim
mouse_map ctrl+shift+right press ungrabbed combine : mouse_select_command_output : kitty_scrollback_nvim --config ksb_builtin_last_visited_cmd_output

# uses kitty_scrollback_nvim instead
# map ctrl+n launch --stdin-source=@last_cmd_output --stdin-add-formatting --type=overlay nvim


map kitty_mod+s launch ~/.config/kitty/save-kitty-session.sh
