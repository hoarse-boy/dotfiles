# NOTE: dont bind these keys. used by tui like nvim
# ctrl+ h j k l
# or most of the non shift as it is uses by nvim

################################################################################
## BINDINGS
################################################################################

# use kitty_mod+z or x to navigate between command outputs and then copy it
# copy current output of the first command on the screen
map kitty_mod+o launch --stdin-source=@first_cmd_output_on_screen --type=clipboard 

# copy last output
map kitty_mod+y launch --stdin-source=@last_cmd_output --type=clipboard

map ctrl+tab next_tab
map ctrl+shift+tab previous_tab 
# map kitty_mod+h previous_tab 
# map kitty_mod+l next_tab

map kitty_mod+1 goto_tab 1
map kitty_mod+2 goto_tab 2
map kitty_mod+3 goto_tab 3
map kitty_mod+4 goto_tab 4
map kitty_mod+5 goto_tab 5
map kitty_mod+6 goto_tab 6
map kitty_mod+7 goto_tab 7
map kitty_mod+8 goto_tab 8
map kitty_mod+9 goto_tab 9
map kitty_mod+0 goto_tab 10

# go to last tab
map kitty_mod+u goto_tab -1

# send real ctrl+\ control character.
# this is for atch in kitty with fish shell
map ctrl+\ send_text all \x1c

map ctrl+t new_tab_with_cwd
map kitty_mod+t new_tab_with_cwd !neighbor 
map kitty_mod+w close_tab

# rename tab
map kitty_mod+r set_tab_title

# map kitty_mod+t no_op
# map cmd+t no_op
map alt+t no_op

################################################################################
## TAB
################################################################################

tab_bar_min_tabs 2
# tab_bar_min_tabs 1
tab_title_max_length 5

tab_separator ""
tab_bar_edge top
tab_bar_margin_width 1.1

tab_bar_margin_height 5.5 5.5

tab_title_template "{index}:{title}"
tab_bar_style custom

################################################################################
## FONT
################################################################################

# Set font to JetBrainsMono Nerd Font
font_family      JetBrainsMono Nerd Font
font_size        12.0

# to make underline of indent_blankline nvim plugin to be like vscode's
modify_font underline_position 7 # value of 10 has the same effect as 7
modify_font underline_thickness 200% # to match indent-blankline thick pipe symbol

################################################################################
## THEME
################################################################################

# Catppuccin Mocha
# foreground              #CDD6F4
# background              #1E1E2E
selection_foreground    #1E1E2E
selection_background    #F5E0DC

# Hyper-Bright Pastel Theme (+70% Pop | Maximum Contrast)

# # Red - Hot pink
color1                  #FF3B7D
color9                  #FF3B7D

# # Green - Neon mint
color2                  #5CFF42
color10                 #5CFF42

# # Yellow - Electric lemon
color3                  #FFE02B
color11                 #FFE02B

# # Blue - Brilliant azure
color4                  #3D9AFF
color12                 #3D9AFF

# # Magenta - Vibrant orchid
color5                  #FF7FCF
color13                 #FF7FCF

# # Cyan - Bright turquoise
color6                  #2AFFD4
color14                 #2AFFD4

# # White - Crystal lavender
color7                  #F0F4FF
color15                 #EDF2FF

# # Cursor - Bright peach
cursor                  #FF9F85
