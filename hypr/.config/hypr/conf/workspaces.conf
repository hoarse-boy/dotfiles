# FIX: move this to other conf?
misc {
  # ex. go to browser when an app needs to open a link.
  # focus_on_activate = true # already active in ml4w custom config
}

input {
  # keyboard repeat delay and rate
  repeat_delay = 400
  repeat_rate = 50
}

# ws 1. browser
windowrule {
  name = firefox window
  match:class = firefox
  workspace = 1
}

windowrule {
  name = chromium window
  match:class = chromium
  workspace = 1
}

windowrule {
  name = vivaldi window
  match:class = vivaldi-stable
  workspace = 1
}
exec-once = $browser

# ws 2. terminal emulator
windowrule {
  name = ghostty window
  match:class = com.mitchellh.ghostty
  workspace = 2
  opacity = $opacityDarker
}
# why there are two? the first one is to make ghostty to not super slow when spawn new app again. second is to open it and run tmux.
exec-once = ghostty --gtk-single-instance=true --quit-after-last-window-closed=false --initial-window=false
exec-once = ghostty --gtk-single-instance=true -e bash -c "$HOME/.local/bin/gen-tmux-ses work"
# exec-once = ghostty --gtk-single-instance=true -e start-tmux-work # does not work as current os shell is bash.

windowrule {
  name = kitty window
  match:class = kitty
  workspace = 2
  opacity = $opacityDarker
}

windowrule {
  name = wezterm window
  match:class = wezterm
  workspace = 2
  opacity = $opacityDarker
}

# ws 3. other work apps
windowrule {
  name = postman window
  match:class = Postman
  workspace = 3
  opacity = $opacityDarker
}
exec-once = postman

windowrule {
  name = redis window
  match:class = RedisInsight
  workspace = 3
  opacity = $opacityValue
}

windowrule {
  name = dbeaver window
  match:class = DBeaver
  workspace = 3
  opacity = $opacityValue
}

# ws 4. messanger, etc
windowrule {
  name = slack window
  match:class = Slack
  workspace = 4
  opacity = $opacityValue
}
exec-once = slack

