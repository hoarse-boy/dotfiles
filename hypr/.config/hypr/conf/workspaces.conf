# ws 1. browser
windowrule {
  name = firefox window
  match:class = firefox
  workspace = 1
}

windowrule {
  name = chromium window
  match:class = chromium
  workspace = 1
}

windowrule {
  name = vivaldi window
  match:class = vivaldi-stable
  workspace = 1
}
exec-once = $browser

# ws 2. terminal emulator
windowrule {
  name = ghostty window
  match:class = com.mitchellh.ghostty
  workspace = 2
  opacity = $opacityDarker
}
# why there are two? the first one is to make ghostty to not super slow when spawn new app again. second is to open it and run tmux.
# exec-once = ghostty --gtk-single-instance=true --quit-after-last-window-closed=false --initial-window=false
# exec-once = ghostty --gtk-single-instance=true -e bash -c "$HOME/.local/bin/gen-tmux-ses work"
# exec-once = ghostty --gtk-single-instance=true -e start-tmux-work # does not work as current os shell is bash.

windowrule {
  name = kitty window
  match:class = kitty
  workspace = 2
  opacity = $opacityDarker
}
exec-once = $term

windowrule {
  name = wezterm window
  match:class = wezterm
  workspace = 2
  opacity = $opacityDarker
}

# ws 3. other work apps
windowrule {
  name = postman window
  match:class = Postman
  workspace = 3
  opacity = $opacityDarker
}
exec-once = postman

windowrule {
  name = redis window
  match:class = RedisInsight
  workspace = 3
  opacity = $opacityValue
}

windowrule {
  name = dbeaver window
  match:class = DBeaver
  workspace = 3
  opacity = $opacityValue
}

# ws 4. messanger, etc
windowrule {
  name = slack window
  match:class = Slack
  workspace = 4
  opacity = $opacityValue
}
exec-once = slack

windowrule {
  name = teams window
  match:class = vivaldi-teams.live.com__-Default
  workspace = 4
  opacity = $opacityValue
}

windowrule {
  name = telegram window
  match:class = org.telegram.desktop
  workspace = 4
  opacity = $opacityValue
}

windowrule {
  name = obsidian window
  match:class = obsidian
  workspace = 4
  opacity = $opacityValue
}

# NOTE: dont enable this for any explorer gui as it is needed when drop and drag with other gui or any other use case.
# windowrulev2 = workspace 4, class:^(org.gnome.Nautilus)$
# windowrulev2 = workspace 4, class:^(org.kde.dolphin)$

# ws 5. other less important apps
windowrule {
  name = lollypop window
  match:class = org.gnome.Lollypop
