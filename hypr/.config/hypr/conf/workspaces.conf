# NOTE: to make special workspaces, make sure to enable the following; enabled blur, blur passes value to 0, enable blur xray, enable blur new optimizations.

# general workspace variables
$opacityValue = 0.95
$opacityDarker = 0.97

# quick-note like nvim scratchpad but in hyprland special workspace
$cl_qn = g.nt
$quicknote = ghostty --class=$cl_qn -e bash -c \"nvim $HOME/jho-notes/quick-note.md\"
$ws_qn = nt
bindd = $mainMod, N, Toggle Quick-note Workspace, exec, ~/.config/hypr/scripts/toggle-special-workspace.sh "$quicknote" "$cl_qn" "$ws_qn" # FIX: . check and test this. remove comments later:
windowrule {
  name = ghostty quicknote window
  match:class = $cl_qn
  workspace = special:$ws_qn
  opacity = $opacityValue
  no_screen_share = on # FIX: . test this in sharing
}
exec-once = ghostty --class=$cl_qn -e bash -c "nvim $HOME/jho-notes/quick-note.md"

# pop-up terminal for general use
$ex_term = kitty --class tm gen-tmux-ses term
bindd = $mainMod, I, Config terminal, exec, ~/.config/hypr/scripts/toggle-special-workspace.sh "$ex_term" "tm" "tm"
windowrule {
  name = kitty general terminal window
  match:class = tm
  workspace = special:tm
  render_unfocused = true
  opacity = $opacityValue
}
exec-once = $ex_term

# terminal for config and dotfiles
$class_and_sws_cf = cf
$ex_conf = kitty --class cf gen-tmux-ses conf
bindd = $mainMod, O, Config terminal, exec, ~/.config/hypr/scripts/toggle-special-workspace.sh "$ex_conf" "$class_and_sws_cf" "$class_and_sws_cf"
windowrule {
  name = kitty config window
  match:class = $class_and_sws_cf
  workspace = special:$class_and_sws_cf
  opacity = $opacityValue
}
exec-once = $ex_conf

