# NOTE: to make special workspaces look nice make sure to enable the following;
# enabled blur, blur passes value to 0, enable blur xray, enable blur new optimizations.

# general workspace variables
$opacityValue = 0.95
$opacityDarker = 0.97

# quick-note like nvim scratchpad but in hyprland special workspace
$note_class = nt
$quicknote = kitty --class $note_class ~/.config/hypr/scripts/open-quick-note.sh
bindd = $mainMod, N, Toggle Quick-note Workspace, exec, ~/.config/hypr/scripts/toggle-special-workspace.sh "$quicknote" "$note_class" "$note_class"
windowrule {
  name = kitty quicknote window
  match:class = $note_class
  workspace = special:$note_class
  opacity = $opacityValue
  no_screen_share = on
}
exec-once = $quicknote

# pop-up terminal for general use
$spc_term_class = tm
$spc_term = kitty --class $spc_term_class --session ~/.config/kitty/sessions/tm.session
bindd = $mainMod, I, Config terminal, exec, ~/.config/hypr/scripts/toggle-special-workspace.sh "$spc_term" "$spc_term_class" "$spc_term_class"
bindd = $mainMod SHIFT, I, Config terminal, exec, $spc_term
windowrule {
  name = kitty general terminal window
  match:class = $spc_term_class
  workspace = special:$spc_term_class
  render_unfocused = true
  opacity = $opacityValue
}
exec-once = $spc_term

# terminal for config and dotfiles
$config_class = cf
$term_config = kitty --class cf --session ~/.config/kitty/sessions/cf.session
bindd = $mainMod, O, Config terminal, exec, ~/.config/hypr/scripts/toggle-special-workspace.sh "$term_config" "$config_class" "$config_class"
windowrule {
  name = kitty config window
  match:class = $config_class
  workspace = special:$config_class
  opacity = $opacityValue
}
exec-once = $term_config

# chat ai apps
$vivaldi_chatgpt = vivaldi --enable-features=UseOzonePlatform --ozone-platform=wayland --app=https://chatgpt.com
$cl_gpt = vivaldi-chatgpt.com__-Default
$ws_ai = ai
bindd = $mainMod, Return, Toggle Ai Apps, exec, ~/.config/hypr/scripts/toggle-special-workspace.sh "$vivaldi_chatgpt" "$cl_gpt" "$ws_ai"
# bindd = $mainMod, Return, Toggle Ai Apps, exec, ~/.config/hypr/scripts/toggle-special-workspace.sh "$vivaldi_chatgpt" "$cl_gpt" "$ws_ai"
windowrule {
  name = vivaldi chatgpt window
  match:class = $cl_gpt
  workspace = special:$ws_ai
  opacity = $opacityValue
  fullscreen_state = 1 1
}
exec-once = $vivaldi_chatgpt

# deepseek
$vivaldi_deepseek = vivaldi --enable-features=UseOzonePlatform --ozone-platform=wayland --app=https://chat.deepseek.com
$cl_ds = vivaldi-chat.deepseek.com__-Default
windowrule {
  name = vivaldi deepseek window
  match:class = $cl_ds
  workspace = special:ai
  opacity = $opacityValue
}
exec-once = $vivaldi_deepseek 

# kimi
$vivaldi_kimi = vivaldi --enable-features=UseOzonePlatform --ozone-platform=wayland --app=https://www.kimi.com
$cl_kimi = vivaldi-www.kimi.com__-Default
windowrule {
  name = vivaldi kimi window
  match:class = $cl_kimi
  workspace = special:ai
  opacity = $opacityValue
}
exec-once = $vivaldi_kimi

# gemini
$vivaldi_gem = vivaldi --enable-features=UseOzonePlatform --ozone-platform=wayland --app=https://gemini.google.com/app
$cl_gem = vivaldi-gemini.google.com__app-Default
windowrule {
  name = vivaldi gemini window
  match:class = $cl_gem
  workspace = special:ai
  opacity = $opacityValue
}
# exec-once = $vivaldi_gem

