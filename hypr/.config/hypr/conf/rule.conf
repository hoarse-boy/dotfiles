# See https://wiki.hypr.land/Configuring/Window-Rules/ for more

# Example windowrule
# windowrule = float,class:^(kitty)$,title:^(kitty)$

# Ignore maximize requests from apps. You'll probably like this. # FIX: . check and test this. remove comments later:
windowrule {
  name = windowrule-1
  suppress_event = maximize
  match:class = .*
}

# Fix some dragging issues with XWayland
windowrule {
  name = windowrule-2
  no_focus = on
  match:class = ^$
  match:title = ^$
  match:xwayland = 1
  match:float = 1
  match:fullscreen = 0
  match:pin = 0
}

windowrule {
  name = windowrule-3
  tag = +multimedia_video
  match:class = ^([Mm]pv|vlc)$
}

windowrule {
  name = windowrule-4
  tag = +settings
  match:class = ^(nm-applet|nm-connection-editor|blueman-manager|org.gnome.FileRoller)$
}

windowrule {
  name = windowrule-5
  tag = +settings
  match:class = ^(org.gnome.DiskUtility|wihotspot(-gui)?)$
}

windowrule {
  name = windowrule-6
  tag = +viewer
  match:class = ^(org.gnome.SystemMonitor)$ # system monitor
}

windowrule {
  name = windowrule-7
  tag = +viewer
  match:class = ^(org.gnome.Evince)$ # document viewer
}

windowrule {
  name = windowrule-8
  tag = +viewer
  match:class = ^(eog|org.gnome.Loupe)$ # image viewer
}

# APPLIACTIONS BLUR # FIX: . remove this if nto good. i dont like blur
windowrule {
  name = windowrule-9
  no_blur = on
  opacity = 1.0
  float = on
  size = 900 506
  match:tag = multimedia_video*
}

windowrule {
  name = windowrule-10
  opacity = 0.8
  float = on
  match:tag = settings*
}

windowrule {
  name = windowrule-11
  opacity = 1
  # opacity = 0.8
  match:class = ^(org.gnome.Nautilus|code-insiders|thunar)$
}

windowrule {
  name = windowrule-12
  opacity = 0.8
  match:class = ^(gedit|org.gnome.TextEditor|geany)$
}

windowrule {
  name = windowrule-13
  opacity = 0.8
  float = on
  size = (monitor_w*0.5) (monitor_h*0.6)
  match:class = ^(org.pulseaudio.pavucontrol)$
}

windowrule {
  name = windowrule-14
  opacity = 0.8
  match:class = ^(kitty)$
}

windowrule {
  name = windowrule-15
  opacity = 0.8
  workspace = 4 silent
  match:class = ^(spotify)$
}

windowrule {
  name = windowrule-16
  opacity = 0.8
  workspace = 5 silent
  match:class = ^(discord)$
}

windowrule {
  name = windowrule-17
  opacity = 0.8
  workspace = 5 silent
  match:class = ^(org.telegram.desktop)$
}

windowrule {
  name = windowrule-18
  opacity = 0.8
  match:class = ^(brave-browser)$
}

windowrule {
  name = windowrule-19
  opacity = 1.0
  match:class = ^(brave-browser)$
  match:title = .*YouTube.*
}

windowrule {
  name = windowrule-20
  opacity = 1.0
  match:class = ^(brave-browser)$
  match:title = .*HiAnime.*
}

windowrule {
  name = windowrule-21
  opacity = 1.0
  match:class = ^(brave-browser)$
  match:title = .*1Flix.*
}

#windowrule = opacity 0.8 override 0.6 override 1 override, tag:viewer*
windowrule {
  name = windowrule-22
  float = on
  center = on
  border_size = 0
  stay_focused = on
  match:class = ^(flameshot)$
}

# LAYER RULES
windowrule {
  name = windowrule-23
  float = on
  center = on
  size = (monitor_w*0.6) (monitor_h*0.6)
  opacity = 0.97
  # opacity = 0.8
  match:class = ^(fterm)$
}

windowrule {
  name = image viewer
  float = on
  center = on
  size = (monitor_w*0.8) (monitor_h*0.8)
  opacity = 1
  match:class = imv
}

windowrule {
  name = windowrule-24
  workspace = 2
  match:class = ^(code-insiders)$
}

windowrule {
  name = windowrule-25
  workspace = 2
  match:class = ^(geany)$
}

windowrule {
  name = windowrule-26
  opacity = 0.8
  border_size = 0
  match:class = ^(music.py)$
}

layerrule {
  name = layerrule-1
  blur = on
  ignore_alpha = 0.5
  animation = popin 60%
  match:namespace = rofi
}

#layerrule = dimaround, rofi
layerrule {
  name = layerrule-2
  blur = on
  ignore_alpha = 0
  match:namespace = notifications
}

layerrule {
  name = layerrule-3
  blur = on
  ignore_alpha = 0.5
  match:namespace = waybar
}

layerrule {
  name = layerrule-4
  ignore_alpha = 0.5
  match:namespace = tag:notif*
}

# wlogout
layerrule {
  name = layerrule-5
  blur = on
  animation = popin 60%
  xray = 0 # 1 for showing full background wallpaper
  match:namespace = logout_dialog
}

# SWAYNC BLUR & XRAY
layerrule {
  name = layerrule-6
  blur = on
  ignore_alpha = 0.5
  xray = 0
  animation = slide right 60%
  match:namespace = swaync-control-center
}

layerrule {
  name = layerrule-7
  blur = on
  ignore_alpha = 0.5
  xray = 0
  animation = slide 60%
  match:namespace = swaync-notification-window
}

# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

# Control center (the panel you toggle)

#FLOAT
windowrule {
  name = windowrule-27
  float = on
  match:tag = viewer*
}

# Ignore maximize requests from apps. You'll probably like this.

# Fix some dragging issues with XWayland

# POP UPS AND DIALOGUES
windowrule {
  name = windowrule-28
  float = on
  size = (monitor_w*0.5) (monitor_h*0.6)
  center = on
  match:title = ^(Save As|Save a File|Pick Files|Select Image)$
}

windowrule {
  name = windowrule-29
  float = on
  size = (monitor_w*0.7) (monitor_h*0.6)
  match:initial_title = (Open File)
}

windowrule {
  name = windowrule-30
  float = on
  size = (monitor_w*0.7) (monitor_h*0.6)
  match:initial_title = (All Files)
}

windowrule {
  name = windowrule-31
  float = on
  size = (monitor_w*0.35) (monitor_h*0.45)
  match:class = (hyprmixer)
}

windowrule {
  name = windowrule-32
  float = on
  size = (monitor_w*0.7) (monitor_h*0.6)
  match:class = (xdg-desktop-portal-gtk)
}

windowrule {
  name = windowrule-33
  float = on
  size = (monitor_w*0.7) (monitor_h*0.6)
  match:class = (feh)
}

windowrule {
  name = float rmpc (mpd terminal)
  float = on
  opacity = 0.97
  # opaque = on
  center = on
  size = (monitor_w*0.8) (monitor_h*0.6)
  match:class = $fMpd
}

