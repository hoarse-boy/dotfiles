#################
### AUTOSTART ###
#################
exec-once = swww-daemon
exec-once = waybar
exec-once = swaync
exec-once = wl-paste --type text --watch cliphist store # Stores only text data
exec-once = wl-paste --type image --watch cliphist store # Stores only image data
exec-once = qs --path ~/.config/quickshell/hypr-overview &
exec-once = qs --path ~/.config/quickshell/hypr-lens &
exec-once = playerctld
exec-once = swayosd-server
exec-once = hypridle
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = mpd-mpris
# exec-once = qs --path ~/.config/quickshell/music & # causes high cpu usage
exec-once = ~/.config/rmpc/song-notify.sh

 # FIX: . fix the kanata not having wyaland env
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_RUNTIME_DIR # FIX: . check and test this. remove comments later:
# Autostart necessary processes (like notifications daemons, status bars, etc.)

