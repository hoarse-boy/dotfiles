# Replace the "вқҜ" symbol in the prompt with "вһң"
[character] # The name of the module we are configuring is "character"
success_symbol = "[ о©ұ пҒӢ](bold fg:blue)"
error_symbol = "[ пҖҚ пҒӢ](bold fg:red)"

# fish vim-mode
vimcmd_symbol = '[ о©ұ пҒӢ](bold fg:green)'
vimcmd_visual_symbol = '[ о©ұ пҒӢ](bold fg:purple)'
vimcmd_replace_symbol = '[ о©ұ пҒӢ](bold fg:purple)'
vimcmd_replace_one_symbol = '[ о©ұ пҒӢ](bold fg:red)'

# Disable the package module, hiding it from the prompt completely
[package]
disabled = true

[git_branch]
style = "bg: cyan"
symbol = "у°ҳ¬"
truncation_length = 12
truncation_symbol = ""
format = "[оӮ¶](bold fg:cyan)[$symbol $branch(:$remote_branch)](fg:black bg:cyan)[оӮҙ](bold fg:cyan)"
# format = "у°ңҘ [оӮ¶](bold fg:cyan)[$symbol $branch(:$remote_branch)](fg:black bg:cyan)[оӮҙ](bold fg:cyan)"

[git_commit]
commit_hash_length = 4
tag_symbol = "п’¶ "

[git_state]
format = '[\($state( $progress_current of $progress_total)\)]($style) '
cherry_pick = "[рҹҚ’ PICKING](bold red)"

[git_status]
conflicted = " рҹҸі "
ahead = " рҹҸҺрҹ’Ё "
behind = " рҹҳ° "
diverged = " рҹҳө "
untracked = " рҹӨ· вҖҚ"
stashed = " рҹ“Ұ "
modified = " рҹ“қ "
staged = '[++\($count\)](green)'
renamed = " вңҚпёҸ "
deleted = " рҹ—‘ "

[hostname]
ssh_only = false
format = "[вҖў$hostname](bg:cyan bold fg:black)[оӮҙ](bold fg:cyan)"
trim_at = ".companyname.com"
disabled = false

[line_break]
disabled = false

[memory_usage]
disabled = true
threshold = -1
symbol = " "
style = "bold dimmed green"

[time]
disabled = true
format = 'рҹ•ҷ[\[ $time \]]($style) '
time_format = "%T"

[username]
style_user = "bold bg:cyan fg:black"
style_root = "red bold"
format = "[оӮ¶](bold fg:cyan)[$user]($style)"
disabled = false
show_always = true

[directory]
home_symbol = " п‘ӯ "
read_only = " п‘– "
style = "bg:blue fg:black"
# style = "bg:green fg:black"
truncation_length = 6
truncation_symbol = " вҖўвҖў/"
format = '[оӮ¶](bold fg:blue)[у°үӢ $path]($style)[оӮҙ](bold fg:blue)'
# format = '[оӮ¶](bold fg:green)[у°үӢ $path]($style)[оӮҙ](bold fg:green)'


[directory.substitutions]
"Desktop" = " п’© "
"Documents" = " п’Ҙ "
"Downloads" = " пҗү "
"Music" = " у°ҺҲ "
"Pictures" = " пҗҸ "
"Videos" = " п”¬ "
"GitHub" = " у°ҠӨ "

[cmd_duration]
# min_time = 100
min_time = 0
format = '[оӮ¶](bold fg:white)[у°Әў $duration](bold bg:white fg:black)[оӮҙ](bold fg:white)'
# format = '[оӮ¶](bold fg:yellow)[у°Әў $duration](bold bg:yellow fg:black)[оӮҙ](bold fg:yellow)'
